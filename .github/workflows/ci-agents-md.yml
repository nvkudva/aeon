name: ci-agents-md

# AGENTS.md carries STRATEGY.md for the Grok Build (grok) harness — grok reads
# CLAUDE.md natively but does NOT expand its `@STRATEGY.md` import, so the
# strategy is generated into AGENTS.md by scripts/gen-agents-md.js. (The rest of
# the operating manual is NOT duplicated: grok loads CLAUDE.md directly.) This
# workflow fails any PR that edits STRATEGY.md (or the generator) without
# regenerating AGENTS.md, so the strategy can't silently drift between harnesses.
#
# Regenerate locally with: node scripts/gen-agents-md.js

on:
  pull_request:
    paths:
      - 'STRATEGY.md'
      - 'AGENTS.md'
      - 'scripts/gen-agents-md.js'
      - '.github/workflows/ci-agents-md.yml'
  push:
    branches: [main]
    paths:
      - 'STRATEGY.md'
      - 'AGENTS.md'
      - 'scripts/gen-agents-md.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check AGENTS.md is regenerated from STRATEGY.md
        run: node scripts/gen-agents-md.js --check
