name: Aeon · Scheduler
run-name: "scheduler: cron"

# The cron scheduler. Extracted from messages.yml so scheduling and message
# polling are independent workflows: separate failure domains, timeouts, and
# concurrency. This job parses the root aeon.yml, cron-matches enabled skills /
# chains / reactive triggers with a debt/catch-up model (scripts/cron-due.sh),
# dispatches aeon.yml + chain-runner.yml, and commits memory/cron-state.json.
#
# GitHub delivers only ~10% of */5 schedule ticks, so an external uptime pinger
# may POST a `cron-tick` repository_dispatch to catch up missed slots (the debt
# model below makes that safe — a slot can't double-fire). messages.yml also
# listens to schedule + cron-tick to drive its poller; the two never overlap
# because each workflow owns a disjoint step.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [cron-tick]

permissions:
  contents: write
  pull-requests: write
  issues: write   # append cron dispatch events to the Issues-as-state ledger
                  # (§3); harmless when STATE_BACKEND is unset/file
  actions: write  # to `gh workflow run aeon.yml` / `chain-runner.yml`

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: '--no-deprecation'

# Ticks serialize so a slow tick can't overlap the next and double-dispatch.
concurrency:
  group: aeon-scheduler
  cancel-in-progress: false

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"

      - name: Determine and dispatch scheduled skills
        env:
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          STATE_BACKEND: ${{ vars.STATE_BACKEND }}
        run: |
          NOW_ISO=$(date -u +%FT%TZ)
          NOW_EPOCH=$(date -u +%s)

          # Catch-up depth, in hours, for both skills and chains. GitHub delivers
          # only ~10% of the */5 ticks, so gaps routinely exceed a 2h window and a
          # due slot would age out and silently drop. scripts/cron-due.sh treats
          # each skill/chain's last dispatch as a debt ledger and catches up any
          # slot missed within this many hours. It is also the de-facto max
          # lateness: a slot older than this is skipped rather than fired stale.
          # 12h covers a bad half-day tick outage while staying same-day (a daily
          # skill's slots are 24h apart, so this can never double-fire). Tune here.
          CATCHUP_HOURS=12

          # (Cron matching + the due/skip decision live in scripts/cron-due.sh,
          # called by both the per-skill and per-chain loops below.)

          # --- Load cron state ---
          # Issues-as-state (hardening §3) tri-state, matching aeon.yml/chain-runner:
          #   file (DEFAULT) — self-contained: commit cron-state.json only, no Issue
          #                    reads/writes. Best for fork-and-forget; the debt model
          #                    self-heals the rare commit race (a lost write re-fires).
          #   dual           — opt-in: file authoritative, but ALSO mirror each dispatch
          #                    to the pinned Issue so the ledger builds up for a later flip.
          #   issues         — the Issue is source of truth: fold it into the file before
          #                    reading, append dispatches, and skip the file commit.
          STATE_FILE="memory/cron-state.json"
          BACKEND="${STATE_BACKEND:-file}"
          if [ "$BACKEND" = "issues" ]; then
            if GH_REPO="$GITHUB_REPOSITORY" bash scripts/state_store.sh materialize "aeon:cron-state" "$STATE_FILE" >/dev/null 2>&1; then
              echo "cron-state materialized from the Issues backend"
            else
              echo "::warning::could not materialize cron-state from the Issue; using committed file"
            fi
          fi
          if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
            STATE=$(cat "$STATE_FILE")
          else
            STATE='{}'
          fi

          # Mirror a dispatch to the append-only Issue ledger (dual/issues): fold a
          # "dispatched" event -> last_dispatch (scripts/state_reduce.py) so the
          # watermark survives without a file commit. Memoizes the issue number and
          # no-ops in file mode. Used for both skills ("$SKILL") and chains
          # ("chain:$CH"). $NOW_ISO / $BACKEND are in scope from above.
          STATE_ISSUE=""
          STATE_ISSUE_TRIED=false
          append_dispatch_event() {
            local key="$1" ev
            [ "$BACKEND" = "file" ] && return 0
            if [ "$STATE_ISSUE_TRIED" = "false" ]; then
              STATE_ISSUE_TRIED=true
              STATE_ISSUE=$(GH_REPO="$GITHUB_REPOSITORY" bash scripts/state_store.sh ensure "aeon:cron-state" 2>/dev/null | tr -d '[:space:]' || true)
            fi
            [ -z "$STATE_ISSUE" ] && return 0
            ev=$(jq -cn --arg s "$key" --arg ts "$NOW_ISO" '{skill:$s,status:"dispatched",ts:$ts}')
            GH_REPO="$GITHUB_REPOSITORY" bash scripts/state_store.sh append "$STATE_ISSUE" "$ev" \
              || echo "::warning::dispatch-event append failed for $key (backend=$BACKEND)"
          }

          # --- Parse aeon.yml ---
          declare -A SKILL_ENABLED SKILL_SCHEDULE SKILL_VAR
          SKILL_ORDER=()
          CURRENT_SKILL=""
          while IFS= read -r line; do
            # Inline format: skill-name: { enabled: true, schedule: "..." }
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *\{(.+)\} ]]; then
              CURRENT_SKILL="${BASH_REMATCH[1]}"
              INLINE="${BASH_REMATCH[2]}"
              SKILL_ORDER+=("$CURRENT_SKILL")
              [[ "$INLINE" =~ enabled:\ *true ]] && SKILL_ENABLED["$CURRENT_SKILL"]="true" || SKILL_ENABLED["$CURRENT_SKILL"]="false"
              [[ "$INLINE" =~ schedule:\ *\"([^\"]+)\" ]] && SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
              [[ "$INLINE" =~ var:\ *\"([^\"]+)\" ]] && SKILL_VAR["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
              CURRENT_SKILL=""
              continue
            fi
            # Multi-line format — covers both block-mapping (name: then 4-space
            # fields) and split flow maps an editor/formatter may produce (name:
            # then a lone "{", then deeper-indented "enabled:"/"schedule:" fields,
            # then "}"). The optional trailing "{" also catches "name: {" on one
            # line. Field regexes accept 3+ spaces so 4- and 6-space indents both
            # parse — otherwise a reformatted *enabled* skill silently loses its
            # schedule and is never dispatched (the default below is enabled=true).
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *\{?\ *$ ]]; then
              CURRENT_SKILL="${BASH_REMATCH[1]}"
              SKILL_ORDER+=("$CURRENT_SKILL")
              SKILL_ENABLED["$CURRENT_SKILL"]="true"
              SKILL_SCHEDULE["$CURRENT_SKILL"]=""
              SKILL_VAR["$CURRENT_SKILL"]=""
            fi
            if [[ "$line" =~ ^\ \ \ +enabled:\ *false ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_ENABLED["$CURRENT_SKILL"]="false"
            fi
            if [[ "$line" =~ ^\ \ \ +schedule:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
            fi
            if [[ "$line" =~ ^\ \ \ +var:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_VAR["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
            fi
          done < aeon.yml

          # --- Match skills ---
          MATCHED=()
          for SKILL in "${SKILL_ORDER[@]}"; do
            [ "${SKILL_ENABLED[$SKILL]}" = "false" ] && continue
            SCHED="${SKILL_SCHEDULE[$SKILL]}"
            [ -z "$SCHED" ] && continue
            [ "$SCHED" = "workflow_dispatch" ] && continue
            [ "$SCHED" = "reactive" ] && continue

            # Read state for this skill
            LAST_STATUS=$(echo "$STATE" | jq -r --arg s "$SKILL" '.[$s].last_status // "none"')
            LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$SKILL" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
            LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)
            MINUTES_SINCE=$(( (NOW_EPOCH - LAST_DISPATCH_EPOCH) / 60 ))

            # --- Retry failed skills (after 30 min cooldown) ---
            if [ "$LAST_STATUS" = "failed" ] && [ "$MINUTES_SINCE" -ge 30 ]; then
              echo "Retrying failed skill: $SKILL (failed ${MINUTES_SINCE}m ago)"
              MATCHED+=("$SKILL")
              continue
            fi

            # --- Normal cron matching (exact-slot "debt" model) ---
            # scripts/cron-due.sh decides due/skip by comparing the most recent
            # scheduled slot (within CATCHUP_HOURS) against last dispatch. This
            # replaces the old "first tick past the minute + 2h hour-window +
            # flat 150m dedup" heuristic, which silently dropped any slot that
            # aged out of the window before a (throttled) tick could see it.
            # Anchoring on the exact slot means it can't double-fire, so no dedup
            # window is needed; it also evaluates day-of-month/week against the
            # slot's own date, fixing alternating-day catch-up across midnight.
            if SLOT_ISO=$(bash scripts/cron-due.sh "$SCHED" "$NOW_EPOCH" "$LAST_DISPATCH_EPOCH" "$CATCHUP_HOURS"); then
              MATCHED+=("$SKILL")
              echo "Matched: $SKILL (schedule: $SCHED, slot: $SLOT_ISO)"
            fi
          done

          if [ ${#MATCHED[@]} -eq 0 ]; then
            echo "No skills matched"
          fi

          # --- Parse depends_on from SKILL.md frontmatter ---
          declare -A SKILL_DEPS
          for SKILL in "${MATCHED[@]}"; do
            SKILL_FILE="skills/${SKILL}/SKILL.md"
            if [ -f "$SKILL_FILE" ]; then
              DEPS=$(sed -n '/^---/,/^---/p' "$SKILL_FILE" | \
                grep -oP 'depends_on:\s*\[([^\]]*)\]' | \
                sed 's/depends_on:\s*\[//;s/\]//' | \
                tr -d ' ' || true)
              [ -n "$DEPS" ] && SKILL_DEPS["$SKILL"]="$DEPS"
            fi
          done

          # --- Order dispatches: dependencies first, then dependents ---
          DEPS_FIRST=()
          DEPS_LAST=()
          for SKILL in "${MATCHED[@]}"; do
            if [ -n "${SKILL_DEPS[$SKILL]:-}" ]; then
              DEPS_LAST+=("$SKILL")
            else
              DEPS_FIRST+=("$SKILL")
            fi
          done
          ORDERED=("${DEPS_FIRST[@]}" "${DEPS_LAST[@]}")

          # --- Parse chains from aeon.yml ---
          declare -A CHAIN_SCHEDULE CHAIN_SKILLS
          CHAIN_ORDER=()
          CHAIN_COVERED_SKILLS=()
          IN_CHAINS=false
          CURRENT_CHAIN=""
          IN_STEPS=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^chains: ]]; then
              IN_CHAINS=true
              continue
            fi
            $IN_CHAINS && [[ "$line" =~ ^[a-z] ]] && IN_CHAINS=false
            $IN_CHAINS || continue

            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+): ]]; then
              CURRENT_CHAIN="${BASH_REMATCH[1]}"
              CHAIN_ORDER+=("$CURRENT_CHAIN")
              IN_STEPS=false
              continue
            fi
            [ -z "$CURRENT_CHAIN" ] && continue
            if [[ "$line" =~ schedule:\ *\"([^\"]+)\" ]]; then
              CHAIN_SCHEDULE["$CURRENT_CHAIN"]="${BASH_REMATCH[1]}"
            fi
            if [[ "$line" =~ parallel:\ *\[([^\]]+)\] ]]; then
              CHAIN_SKILLS["$CURRENT_CHAIN"]+="$(echo "${BASH_REMATCH[1]}" | tr -d ' '),"
            elif [[ "$line" =~ skill:\ *([a-zA-Z0-9_-]+) ]]; then
              CHAIN_SKILLS["$CURRENT_CHAIN"]+="${BASH_REMATCH[1]},"
            fi
          done < aeon.yml

          # Match chains against current time
          MATCHED_CHAINS=()
          for CH in "${CHAIN_ORDER[@]}"; do
            SCHED="${CHAIN_SCHEDULE[$CH]:-}"
            [ -z "$SCHED" ] && continue

            CHAIN_KEY="chain:$CH"
            LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$CHAIN_KEY" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
            LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)

            # Same exact-slot debt decision as the per-skill path (scripts/cron-due.sh).
            bash scripts/cron-due.sh "$SCHED" "$NOW_EPOCH" "$LAST_DISPATCH_EPOCH" "$CATCHUP_HOURS" >/dev/null || continue

            MATCHED_CHAINS+=("$CH")
            IFS=',' read -ra CH_SKILLS <<< "${CHAIN_SKILLS[$CH]}"
            for s in "${CH_SKILLS[@]}"; do
              [ -n "$s" ] && CHAIN_COVERED_SKILLS+=("$s")
            done
            echo "Matched chain: $CH (schedule: $SCHED)"
          done

          # --- Dispatch chains ---
          for CH in "${MATCHED_CHAINS[@]}"; do
            echo "Dispatching chain: $CH"
            # Same exit-code guard + Issue-ledger mirror as the per-skill dispatch:
            # only record a dispatch GitHub accepted, so a rejected one retries next
            # tick instead of being silently marked done.
            if gh workflow run chain-runner.yml -f chain="$CH"; then
              STATE=$(echo "$STATE" | jq --arg s "chain:$CH" --arg ts "$NOW_ISO" \
                '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')
              append_dispatch_event "chain:$CH"
            else
              echo "::warning::chain dispatch failed for $CH — leaving state untouched so the next tick retries"
            fi
            sleep 2
          done

          # --- Filter standalone skills: skip if covered by a chain dispatching now ---
          FILTERED_ORDERED=()
          for SKILL in "${ORDERED[@]}"; do
            SKIP=false
            for covered in "${CHAIN_COVERED_SKILLS[@]}"; do
              if [ "$SKILL" = "$covered" ]; then
                echo "Skipping standalone $SKILL (covered by chain)"
                SKIP=true
                break
              fi
            done
            $SKIP || FILTERED_ORDERED+=("$SKILL")
          done
          ORDERED=("${FILTERED_ORDERED[@]}")

          # --- Evaluate reactive triggers ---
          # Parse reactive section from aeon.yml
          IN_REACTIVE=false
          REACTIVE_SKILL=""
          declare -A REACTIVE_TRIGGERS
          while IFS= read -r line; do
            if [[ "$line" =~ ^reactive: ]]; then
              IN_REACTIVE=true
              continue
            fi
            $IN_REACTIVE && [[ "$line" =~ ^[a-z] ]] && ! [[ "$line" =~ ^[[:space:]] ]] && IN_REACTIVE=false
            $IN_REACTIVE || continue
            [[ "$line" =~ ^\ *# ]] && continue
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+): ]]; then
              REACTIVE_SKILL="${BASH_REMATCH[1]}"
              continue
            fi
            if [ -n "$REACTIVE_SKILL" ] && [[ "$line" =~ on:\ *\"([^\"]+)\".*when:\ *\"([^\"]+)\" ]]; then
              ON="${BASH_REMATCH[1]}"
              WHEN="${BASH_REMATCH[2]}"
              REACTIVE_TRIGGERS["$REACTIVE_SKILL"]+="${ON}:${WHEN};"
            fi
          done < aeon.yml

          # Check reactive triggers against cron state
          for RSKILL in "${!REACTIVE_TRIGGERS[@]}"; do
            IFS=';' read -ra RULES <<< "${REACTIVE_TRIGGERS[$RSKILL]}"
            for rule in "${RULES[@]}"; do
              [ -z "$rule" ] && continue
              ON="${rule%%:*}"
              WHEN="${rule#*:}"

              # Check condition against all skills (or specific source skill)
              TRIGGERED=false
              for CHECK_SKILL in "${SKILL_ORDER[@]}"; do
                [ "${SKILL_ENABLED[$CHECK_SKILL]}" = "false" ] && continue
                [ "$ON" != "*" ] && [ "$ON" != "$CHECK_SKILL" ] && continue

                if [[ "$WHEN" =~ consecutive_failures\ *\>=\ *([0-9]+) ]]; then
                  THRESHOLD="${BASH_REMATCH[1]}"
                  CONSEC=$(echo "$STATE" | jq -r --arg s "$CHECK_SKILL" '.[$s].consecutive_failures // 0')
                  if [ "$CONSEC" -ge "$THRESHOLD" ]; then
                    echo "Reactive trigger: $RSKILL (${CHECK_SKILL} has ${CONSEC} consecutive failures >= ${THRESHOLD})"
                    TRIGGERED=true
                    break
                  fi
                elif [[ "$WHEN" =~ last_status\ *=\ *([a-z]+) ]]; then
                  EXPECTED="${BASH_REMATCH[1]}"
                  ACTUAL=$(echo "$STATE" | jq -r --arg s "$CHECK_SKILL" '.[$s].last_status // "none"')
                  if [ "$ACTUAL" = "$EXPECTED" ]; then
                    echo "Reactive trigger: $RSKILL (${CHECK_SKILL} last_status = ${EXPECTED})"
                    TRIGGERED=true
                    break
                  fi
                fi
              done

              if [ "$TRIGGERED" = "true" ]; then
                # Dedup check
                LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$RSKILL" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
                LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)
                MINUTES_SINCE=$(( (NOW_EPOCH - LAST_DISPATCH_EPOCH) / 60 ))
                if [ "$MINUTES_SINCE" -ge 90 ]; then
                  ORDERED+=("$RSKILL")
                else
                  echo "Skipping reactive $RSKILL (dispatched ${MINUTES_SINCE}m ago)"
                fi
                break
              fi
            done
          done

          # --- Dispatch ---
          DISPATCHED_DEPS=false
          DISPATCHED=()   # skills whose dispatch GitHub accepted; state is stamped only for these
          for SKILL in "${ORDERED[@]}"; do
            if [ -n "${SKILL_DEPS[$SKILL]:-}" ] && [ "$DISPATCHED_DEPS" = "false" ]; then
              DISPATCHED_DEPS=true
              echo "Waiting 5s before dispatching skills with dependencies..."
              sleep 5
            fi

            VAR="${SKILL_VAR[$SKILL]:-}"
            DISPATCH_OK=true
            if [ -n "$VAR" ]; then
              echo "Dispatching: $SKILL (var: $VAR)${SKILL_DEPS[$SKILL]:+ [depends_on: ${SKILL_DEPS[$SKILL]}]}"
              gh workflow run aeon.yml -f skill="$SKILL" -f var="$VAR" || DISPATCH_OK=false
            else
              echo "Dispatching: $SKILL${SKILL_DEPS[$SKILL]:+ [depends_on: ${SKILL_DEPS[$SKILL]}]}"
              gh workflow run aeon.yml -f skill="$SKILL" || DISPATCH_OK=false
            fi

            # Stamp state ONLY for a dispatch GitHub actually accepted. A rejected
            # one (e.g. secondary rate limit during a burst) leaves state untouched,
            # so the next tick still sees the slot owed and retries — instead of the
            # old behaviour that stamped "dispatched" regardless and let the dedup
            # window bury a silent drop.
            if [ "$DISPATCH_OK" = "true" ]; then
              DISPATCHED+=("$SKILL")
              STATE=$(echo "$STATE" | jq --arg s "$SKILL" --arg ts "$NOW_ISO" \
                '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')
              append_dispatch_event "$SKILL"
            else
              echo "::warning::dispatch failed for $SKILL — leaving cron state untouched so the next tick retries"
            fi

            sleep 2
          done

          # --- Persist state ---
          mkdir -p memory
          if [ "$BACKEND" = "issues" ]; then
            # Issues mode: the pinned Issue is source of truth and the dispatches were
            # appended above. The file is a dropped projection — discard any working-
            # tree change so the churn-free end state isn't committed.
            git checkout -- "$STATE_FILE" 2>/dev/null || rm -f "$STATE_FILE"
            echo "issues mode: dispatches appended to the Issue; not committing cron-state.json"
            exit 0
          fi

          echo "$STATE" | jq '.' > "$STATE_FILE"

          git add "$STATE_FILE"
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "chore(scheduler): update cron state"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main 2>/dev/null && git push -u origin HEAD 2>/dev/null; then
                echo "State committed on attempt $i"
                break
              fi
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1 2>/dev/null || true
              git checkout -- "$STATE_FILE" 2>/dev/null || true
              git pull origin main 2>/dev/null || true

              if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
                MERGED=$(cat "$STATE_FILE")
              else
                MERGED='{}'
              fi
              for SKILL in "${DISPATCHED[@]}"; do
                [ -n "$SKILL" ] || continue
                MERGED=$(echo "$MERGED" | jq --arg s "$SKILL" --arg ts "$NOW_ISO" \
                  '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')
              done
              echo "$MERGED" | jq '.' > "$STATE_FILE"
              git add "$STATE_FILE"
              git diff --staged --quiet && { echo "State already up to date after merge"; break; }
              git commit -m "chore(scheduler): update cron state"
              sleep "$i"
            done
          fi
