# Aeon configuration
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.
# Set var: "value" to pass a default parameter to the skill.
# Set model: "claude-sonnet-4-6" per skill to override the default model (cost optimization).
# Set harness: "grok" per skill to run it through the Grok Build CLI instead of the
# default Claude Code harness (see the top-level `harness:` key below).

skills:
  # --- Morning aggregation (7 AM UTC) ---


  # --- Mid-morning (9 AM UTC) ---
  pr-triage: { enabled: false, schedule: "30 9 * * *", var: "" } # first-touch external-PR triage (verdict + label + welcoming comment); var: owner/repo or owner/repo#N for one-shot
  pr-review: { enabled: false, schedule: "0 9 * * *", var: "" } # var: empty/owner/repo=per-PR review (posts comments) | --survey [dry-run] [owner/repo]=risk-tiered PR triage digest (folds in pr-merge)
  auto-merge: { enabled: false, schedule: "0 14 * * *" } # merge green PRs daily at 2 PM UTC; max 3 per run
  github-monitor: { enabled: false, schedule: "0 9 * * *", var: "" } # watch your repos. var: empty=combined monitor (PRs/issues/releases) | issues | releases | prs | owner/repo (folds in github-issues/github-releases/pr-tracker)
  github-trending: { enabled: false, schedule: "0 9 * * *", var: "" } # trending repos + Hugging Face Hub. var: empty=GitHub | <lang> | hf | hf:{models,datasets,spaces}

  # --- Midday (12 PM UTC) ---
  token-movers: { enabled: false, schedule: "0 12 * * *", var: "" } # market-movers scan + single-token deep report. var: empty=movers (CoinGecko) | geckoterminal[:chain]=on-chain runners | category:<slug> | <address|symbol|token:sym>=single-token report. Optional COINGECKO/ALCHEMY/XAI/BASE_RPC keys.
  onchain-monitor: { enabled: false, schedule: "0 12 * * *" }
  distribute-tokens: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand contributor rewards. var: empty/<label>=distribute (send) | plan[:week]=compute reward plan | all[:week]=plan+send | dry-run (folds in contributor-reward). BANKR_API_KEY for send.
  defi-overview: { enabled: false, schedule: "0 12 * * *", var: "" } # one-pass DeFi read: tracked-protocol positions + macro context (regime verdict, movers, yields, fees, F&G, prediction markets; refreshes memory/topics/market-context.md). var: empty=full | positions[:label] | macro | <chain/protocol focus>. Optional COINGECKO_API_KEY.

  # --- Hound onchain investigation (on-demand; var = address / tx hash) ---
  investigation-report: { enabled: false, schedule: "workflow_dispatch", var: "" } # var: <token-address> [--checks=rug,contract,deployer,holders,honeypot,lp] [--depth=quick|deep] — composite investigation (folds in rug-scan/contract-audit/deployer-trace/holder-concentration/honeypot-check/lp-lock). read-only
  tx-explain: { enabled: false, schedule: "workflow_dispatch", var: "" } # var: tx hash — plain-English decode
  ctrl: { enabled: false, schedule: "workflow_dispatch", var: "" } # var: natural-language workflow (e.g. "DCA 0.005 ETH into USDC weekly") — compiles a trigger→action graph into a CTRL V3 vault on Base via the live /api/mcp REST API, hands the user a one-shot signUrl. Agent never signs; the wallet signs an EIP-5792 batch once, the keeper executes after under per-swap/per-day caps. Operator-initiated only. No API key needed (anonymous create; wallet signature is the trust boundary).

  monitor-polymarket: { enabled: false, schedule: "30 12 * * *", var: "" } # prediction-market monitor (Polymarket + Kalshi) — 24h moves, volume, comments, conviction alerts. var: empty=both | polymarket | kalshi | polymarket:<slug> | kalshi:<ticker>
  token-pick: { enabled: false, schedule: "0 12 * * *" }
  price-alert: { enabled: false, schedule: "*/30 * * * *", var: "" } # every 30 minutes — fire on tracked-token ATH, ±20% 1h move, or operator-set target crossing (var=target_price,target_price2,...). Silent on normal runs. Set var=dry-run to skip notify.
  narrative-tracker: { enabled: false, schedule: "30 13 * * *" } # track rising/peaking/fading narratives
  unlock-monitor: { enabled: false, schedule: "0 10 * * 1" } # weekly token unlock/vesting tracker

  # --- Afternoon (2 PM UTC) ---
  article: { enabled: false, schedule: "0 14 * * *", var: "" } # long-form article. var: empty=standard | repo:<owner/repo> | lens:<topic>; append --visual for a Replicate hero image (angles fold in repo-article/project-lens/technical-explainer)
  digest: { enabled: false, schedule: "0 14 * * *", var: "" } # topic digest across web + X + RSS. var: empty=web | <topic> | rss[:<topic>] | "<topic> +rss" (RSS feeds from memory/feeds.yml)
  last30: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — cross-platform 30-day social research
  search-skill: { enabled: false, schedule: "0 14 * * *" }

  # --- Repo intelligence (3 PM UTC) ---

  # --- Late afternoon (4 PM UTC) ---
  changelog: { enabled: false, schedule: "0 16 * * *", var: "" } # changelog from recent commits/PRs. var: empty/owner/repo=in-repo | push-to:owner/website-repo=cross-repo changelog PR (needs GH_GLOBAL)
  vuln-scanner: { enabled: false, schedule: "0 16 * * 6", var: "" } # security scan + disclose. var: empty/owner/repo=scan | resubmit[:owner/repo]=PVR re-submit | disclose=queue armed emails (folds in pvr-watchlist/disclosure-emailer). RESEND_* for email.
  deploy-prototype: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — build app and deploy to Vercel
  base-mcp: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — Base Account access via the Base MCP server (mcp.base.org)
  autoresearch: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — set var to skill name to evolve
  create-skill: { enabled: false, schedule: "workflow_dispatch", var: "" } # one-shot skill creator — set var to a description prompt
  install-skill: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — install a community skill pack and open a PR; var: owner/repo [skill...]

  # --- Knowledge / OKF (memory/topics is a native OKF bundle; see docs/OKF.md) ---
  okf-export: { enabled: false, schedule: "workflow_dispatch", var: "" } # one-shot backfill — add type: frontmatter to existing memory/topics notes + open a PR. var: empty=all | <file.md>|<subdir>
  okf-ingest: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — fetch+validate+QUARANTINE an EXTERNAL OKF bundle into memory/topics/ingested + open a PR (untrusted content; fetched in-run). var: git-url | owner/repo[#subdir]

  # --- X / social (5 PM UTC) ---
  fetch-tweets: { enabled: false, schedule: "0 17 * * *", var: "" } # curate X/Twitter. var: keyword:<q> | topic:<t> | account:<handle> (empty=digest tracked accounts) | list:<ids>[|topic] | agent-buzz[:<t>]. Optional XAI_API_KEY.
  reply-maker: { enabled: false, schedule: "0 17 * * *", var: "" } # draft X replies. var: empty=discover reply-worthy tweets | @handle | <listID> | <topic> | from-logs (reply to flagged log opportunities). Optional XAI_API_KEY.

  # --- Content distribution (runs 30 min after article-generating skills) ---

  # --- Evening / meta (6 PM UTC) ---
  strategy-builder: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — draft STRATEGY.md (north-star / priorities / audience / constraints) from a brief + repo README + memory. var: bare goal text, or structured brief "repo=owner/repo | links=url1,url2 | goal=free text". Powers the dashboard Strategy → Build my strategy button. No API key needed.
  skill-health: { enabled: false, schedule: "0 18 * * *", var: "" } # self-healing health audit + analytics. var: empty=health (files/resolves issues) | <skill>=single | analytics[:hours]=fleet run/pass-rate metrics (folds in skill-analytics)

  self-improve: { enabled: false, schedule: "0 18 1/2 * *", var: "" } # every other day — improve the agent, or audit it. var: empty/improve[:focus]=propose+apply one fix | audit[:focus]=review what ran/failed (folds in self-review)

  action-converter: { enabled: false, schedule: "0 18 * * *" }
  skill-repair: { enabled: false, schedule: "reactive", var: "" } # reactive — auto-fix failing skills

  # --- Cost tracking (Monday 7 AM UTC, weekly) ---

  # --- Weekly (Monday only) ---
  fork-fleet: { enabled: false, schedule: "0 10 * * 1", var: "" } # fork divergence: code (unique commits/skills) + config (aeon.yml vs upstream defaults; folds in fork-digest). var: empty=both | code | config | fork=owner/repo | repo=owner/repo
  spawn-instance: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — var: "name: purpose"
  fleet-control: { enabled: false, schedule: "0 9,15 * * *", var: "" } # managed child instances. var: empty=health check | status | dispatch <inst|*> <skill> [var=…] | scorecard (fleet-wide runs/tokens/cost/reliability; folds in fleet-scorecard)
  shiplog: { enabled: false, schedule: "0 9 * * 1" } # everything shipped SINCE THE LAST RUN (memory/state/shiplog-last.json) — cross-repo PRs/commits, security fixes merged into others' repos, star deltas, X/ecosystem traction → digest article + ready-to-post shiplog in the operator's voice. Cadence-agnostic: this schedule just sets frequency (daily/weekly/on-demand). Config: memory/products.md + memory/watched-repos.md. Optional XAI_API_KEY (X traction) + GH_GLOBAL (cross-repo reach). var: since:DATE | days:N | dry-run | owner/repo | <theme>.
  operator-scorecard: { enabled: false, schedule: "30 10 * * 1", var: "" } # Monday — weekly plain-language scorecard: agent health + community growth + economic activity (worst-of-three OK/WATCH/DEGRADED verdict). var: empty=scorecard (7d) | dry-run=no notify | N=window N hours | ops[ DATE]=end-of-day ops recap (shipped/failed/follow-up) | push[ owner/repo]=diff-deep-dive push recap (folds in ops-recap + push-recap)

  # --- Paid ads (AdManage.ai) ---
  schedule-ads: { enabled: false, schedule: "0 8 * * *", var: "" } # daily 08:00 UTC — paid ads via AdManage.ai. var: empty=schedule ad launches across Meta/TikTok/Snapchat/Pinterest/LinkedIn from config.yaml (PAUSED by default) | create=provision Meta campaigns/ad sets on-demand from config.create.yaml (PAUSED, IDs written back to state so the schedule branch can launch into them; folds in create-campaign)

  # --- Utilities ---
  auto-workflow: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand aeon.yml builder. var: <url[,url]>=analyze→enablement plan | enable:<slugs>=flip enabled:true (validate, commit, PR); enable:dry-run:<slugs> (folds in skill-enabler)

  # --- Ported from derivative instances (PR #219) ---
  # Markets & crypto
  pm-manipulation: { enabled: false, schedule: "15 13 * * *" } # daily — flag suspected PM manipulation from 3-day price/volume/comment + local-press anomalies

  # Research & content
  narrative-convergence: { enabled: false, schedule: "0 13 * * *", var: "" } # daily 13:00 UTC — cross-skill convergence detector: entities/themes surfaced by 3+ independent skill categories in 48h = high-confidence write opportunities. Category map in memory/topics/signal-categories.md. Pass var to filter.

  # Security
  vuln-tracker: { enabled: false, schedule: "30 16 * * *", var: "" } # daily lifecycle poll: vuln-scanner PR/advisory status + PVR triage + disclosure-queue aging (folds in pvr-triage/disclosure-tracker). var: empty=full | pvr | queue | prs | <GHSA-id>

  # Ideas & productivity
  idea-pipeline: { enabled: false, schedule: "0 18 * * 1" } # Monday — execution-gap audit: top 3 backlog ideas to build this week

  # Self-maintenance / meta

  # --- Ported from aeon-aaron ---
  # Infra & health
  # Markets & crypto
  picks-tracker: { enabled: false, schedule: "0 9 * * 0" } # Sunday 09:00 UTC — 30-day retrospective scoring token + prediction-market picks from logs against current prices; W/H/L + hit rate; honest record-keeping. Pairs with token-pick / monitor-polymarket.
  # Content pipeline
  soul-builder: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — build a SOUL from any mix of sources (X handle, full name, links), drafting soul/SOUL.md + STYLE.md + examples so every content skill speaks in that voice. var: bare X handle, or structured brief "x=handle | name=Full Name | links=url1,url2". Powers the dashboard Soul → Build my soul button. XAI_API_KEY optional (name/links use built-in WebSearch/WebFetch).
  # Social
  mention-radar: { enabled: false, schedule: "25 7 2/2 * *", var: "" } # every other day — external web/social mentions of the operator's projects (discovery/confusion/friction/competitor taxonomy + engagement opportunities). var: comma-separated project names; falls back to MEMORY.md / memory/topics/projects.md
  # Sports

  # --- Ported from derivative instances (2026-06-29) ---
  # Security (pairs with vuln-scanner ↑ channel 5d)
  inbox-triage: { enabled: false, schedule: "30 11 * * *" } # daily 11:30 — GitHub notification-inbox triage (maintainer replies to disclosures/advisories/mentions)

  # Dev & repo
  feature: { enabled: false, schedule: "0 10 * * 6", var: "" } # build a feature + open PR. var: watched (default) | external:<owner/repo> | dormant[:<owner/repo>], append --fix-issues (folds in external-feature/repo-revive). GH_GLOBAL for external.

  # Research & content
  write-tweet: { enabled: false, schedule: "0 21 * * *", var: "" } # tweet studio. var: empty=drafts (10×5 tiers) | thread [topic] | remix [window]. Optional XAI_API_KEY (required for remix).
  bd-radar: { enabled: false, schedule: "20 7 * * *", var: "" } # daily 07:20 — BD radar: who's building/forking/integrating/mentioning your products → ranked leads. Products from memory/products.md. Quiet unless high-intent.

  # Product / ops (config: memory/products.md)

  # Self-maintenance / meta
  memory-flush: { enabled: false, schedule: "30 23 * * *" } # daily — promote important recent log entries into MEMORY.md

  # Utilities / on-demand

  send-email: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — compose + send a 1:1 email to a named recipient via Resend (general sibling of disclosure-emailer). var: "to=… | subject=… | about=…"
  idea-forge: { enabled: false, schedule: "0 9 * * 1", var: "" } # weekly business-idea engine. var: empty/generate=timing-scored wedges | validate[:theme]=viability screen | memo[:theme]=2 evidence-backed memos
  # --- Fallback (must be last) ---
  heartbeat: { enabled: true, schedule: "0 8 * * *", var: "" } # ambient fleet-health check (default) — surfaces anything worth attention. var: empty=ambient check | <area>=ambient focused on that area | brief[:<area>]=priority brief (3 things to focus on, why now, what moved; folds in priority-brief)

# Reactive triggers — event-driven skill dispatch based on cron-state.json conditions.
# Skills with schedule: "reactive" are never cron-matched. Instead, the scheduler
# evaluates their trigger rules after processing cron skills.
#
# Format: trigger: { on: <source-skill>, when: "<condition>" }
# Conditions:
#   consecutive_failures >= N    — source skill failed N+ times in a row
#   success_rate < X             — source skill success rate below threshold
#   last_status = success        — source skill just succeeded (for chaining)
#
# Multiple triggers: trigger: [{ on: a, when: "..." }, { on: b, when: "..." }]
# Any matching trigger fires the skill (OR logic).
reactive:
  # skill-repair:
  #   trigger:
  #     - { on: "*", when: "consecutive_failures >= 3" }
  # autoresearch:
  #   trigger:
  #     - { on: skill-health, when: "last_status = success" }

# Chains — multi-step skill pipelines with parallel execution and output passing.
# Steps run sequentially; use parallel: [...] for concurrent execution within a step.
# Skills with consume: [...] receive prior step outputs injected into their context.
#
# Format:
#   chains:
#     chain-name:
#       schedule: "cron expression"
#       on_error: fail-fast          # fail-fast (default) | continue
#       steps:
#         - parallel: [skill-a, skill-b]
#         - skill: skill-c, consume: [skill-a, skill-b]
chains:
  # routine:
  #   schedule: "0 7 * * *"
  #   on_error: fail-fast
  #   steps:
  #     - parallel: [token-movers, hn-digest, issue-triage, github-trending]
  #     - skill: routine, consume: [token-movers, hn-digest, issue-triage, github-trending]

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-8, claude-fable-5, claude-sonnet-5, claude-sonnet-4-6, claude-haiku-4-5-20251001
# (Grok harness models: grok-composer-2.5-fast — fast single-agent default;
#  grok-build — reasoning/multi-agent coding model, run with --no-subagents in CI.
#  Use the bare CLI id `grok-build`, not the API id `grok-build-0.1`.)
model: claude-sonnet-4-6

# Agent harness — which coding-agent CLI runs your skills.
#   claude (default) — Claude Code (`claude -p`); uses the AI Gateway below.
#   grok             — Grok Build (`grok`); logs in with your X account
#                      (GROK_CREDENTIALS, captured in the dashboard) or an
#                      XAI_API_KEY. Bypasses the gateway (grok has its own auth).
# Override per-skill with `harness: "grok"` in the skill entry, or per-run via
# the workflow_dispatch `harness` input. Default stays claude — everything
# already configured keeps working unchanged.
harness: claude

# AI Gateway — route Claude Code requests through an LLM provider.
#
# provider: auto (default) resolves at RUN TIME from whichever provider secret
# is set, in priority order — no need to re-pin when you add/remove a key:
#   claude (CLAUDE_CODE_OAUTH_TOKEN) → anthropic (ANTHROPIC_API_KEY) →
#   openrouter → bankr → usepod → venice → surplus → grok → direct (fallback)
# Override the order with the repo variable GATEWAY_ORDER (space-separated).
#
# Or PIN one explicitly: direct | bankr | openrouter | usepod | venice | surplus | grok.
# grok routes Claude Code at xAI's Anthropic-compatible api.x.ai (XAI_API_KEY) —
# this is the gateway path; to run the grok CLI itself, set `harness: grok` above.
# For Anthropic-compatible endpoints (direct), set repo variable ANTHROPIC_BASE_URL
# + secret ANTHROPIC_API_KEY. Example: https://api.deepseek.com/anthropic
# Bankr docs: https://docs.bankr.bot/llm-gateway/overview
gateway:
  provider: auto

# Output channels
channels:
  jsonrender:
    enabled: true # Set to true (or JSONRENDER_ENABLED=true as repo var) to write json-render specs

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true

# Observability (optional) — no config lives here; it's credential-driven.
# Set the repo secrets LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY and every
# Claude Code run streams to your Langfuse project as a trace (LLM calls,
# tokens, cost, prompts/responses). Region/toggles are repo variables:
# LANGFUSE_HOST (default EU cloud), LANGFUSE_TRACING (0 to disable),
# LANGFUSE_LOG_CONTENT (0 = metadata only). See docs/langfuse.md.
